<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Banj Media</title>
  <meta name="description" content="Actualités, annonces et articles de Banj Media." />
  <link rel="canonical" href="https://www.banjmedia.com/blog/" />
  <link rel="icon" href="/assets/favicon/favicon.ico" sizes="any" />
  <link rel="icon" href="/assets/favicon/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════
       TOKENS  (light — matches main site)
    ══════════════════════════════ */
    :root {
      --white:      #ffffff;
      --black:      #0d0d0d;
      --red:        #D92B2B;
      --red-dim:    rgba(217,43,43,.08);
      --red-mid:    rgba(217,43,43,.18);
      --text:       #0d0d0d;
      --text-mid:   rgba(13,13,13,.52);
      --text-dim:   rgba(13,13,13,.30);
      --divider:    rgba(13,13,13,.08);
      --surface:    #f3f4f6;
      --surface-up: #e8e9ec;
      --nav-h:      72px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 300;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       NAVBAR
    ══════════════════════════════ */
    #topbar {
      position: sticky;
      top: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--divider);
      z-index: 900;
    }

    .tb-logo-img {
      display: flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }
    .tb-logo-img img {
      height: 38px;
      width: auto;
      display: block;
    }

    .tb-nav {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }
    .tb-nav a {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-mid);
      text-decoration: none;
      transition: color .15s;
    }
    .tb-nav a:hover { color: var(--text); }
    .tb-nav .active {
      color: var(--text);
      font-weight: 500;
    }
    .tb-cta {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: #fff;
      background: var(--red);
      padding: 9px 20px;
      border-radius: 100px;
      text-decoration: none;
      white-space: nowrap;
    }
    .tb-cta:hover { opacity: .88; }

    @media (max-width: 768px) {
      #topbar { padding: 0 20px; }
      .tb-cta { display: none; }
      .tb-nav { gap: 20px; }
    }

    /* ══════════════════════════════
       HERO
    ══════════════════════════════ */
    .hero {
      padding: 80px 48px 56px;
      border-bottom: 1px solid var(--divider);
    }
    .hero-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'Big Shoulders Display', sans-serif;
      font-weight: 900;
      font-size: clamp(48px, 8vw, 88px);
      line-height: .94;
      letter-spacing: -.01em;
      color: var(--black);
      margin-bottom: 18px;
    }
    .hero p {
      font-size: 17px;
      font-weight: 300;
      color: var(--text-mid);
      max-width: 480px;
    }

    @media (max-width: 640px) {
      .hero { padding: 56px 20px 40px; }
    }

    /* ══════════════════════════════
       FILTER TABS
    ══════════════════════════════ */
    .filters {
      padding: 28px 48px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--divider);
    }
    .filter-btn {
      padding: 7px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--divider);
      background: transparent;
      color: var(--text-mid);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .filter-btn:hover {
      border-color: rgba(13,13,13,.22);
      color: var(--text);
      background: var(--surface);
    }
    .filter-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    @media (max-width: 640px) {
      .filters { padding: 20px 20px; }
    }

    /* ══════════════════════════════
       POSTS GRID
    ══════════════════════════════ */
    .posts-section {
      padding: 48px 48px 96px;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .posts-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .posts-section { padding: 28px 20px 64px; }
      .posts-grid { grid-template-columns: 1fr; gap: 16px; }
    }

    /* CARD */
    .post-card {
      background: var(--white);
      border: 1.5px solid var(--divider);
      border-radius: 14px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      text-decoration: none;
      color: inherit;
    }
    .post-card:hover {
      border-color: rgba(13,13,13,.18);
      box-shadow: 0 8px 32px rgba(13,13,13,.07);
      transform: translateY(-2px);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Category badges — light mode */
    .cat-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .cat-badge.article { background: #dbeafe; color: #1d4ed8; }
    .cat-badge.annonce { background: var(--red-dim); color: var(--red); }
    .cat-badge.presse  { background: #ede9fe; color: #6d28d9; }
    .cat-badge.update  { background: #dcfce7; color: #15803d; }
    .cat-badge.default { background: var(--surface); color: var(--text-mid); }

    .card-date {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .card-title {
      font-family: 'Big Shoulders Display', sans-serif;
      font-weight: 800;
      font-size: 22px;
      line-height: 1.15;
      color: var(--black);
      letter-spacing: .01em;
    }

    .card-excerpt {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.6;
      flex: 1;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 500;
      color: var(--red);
      margin-top: 4px;
      transition: gap .15s;
    }
    .post-card:hover .card-cta { gap: 9px; }

    /* FEATURED IMAGE */
    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 2px;
    }

    /* EMPTY / LOADING */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state p { color: var(--text-dim); font-size: 16px; }

    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid var(--divider);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    footer {
      border-top: 1px solid var(--divider);
      padding: 40px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      background: var(--surface);
    }
    .foot-logo-img {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .foot-logo-img img {
      height: 34px;
      width: auto;
    }
    footer small {
      font-size: 13px;
      color: var(--text-dim);
    }

    @media (max-width: 640px) {
      footer { padding: 28px 20px; flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav id="topbar">
    <a href="/" class="tb-logo-img">
      <img src="/assets/banj-media-logo.svg" alt="Banj Media" />
    </a>
    <ul class="tb-nav">
      <li><a href="/">← Accueil</a></li>
      <li><a href="/blog/" class="active">Blog</a></li>
    </ul>
    <a href="/#contact" class="tb-cta">Nous contacter</a>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <span class="hero-label">Actualités</span>
    <h1>News &amp; Blog</h1>
    <p>Annonces, analyses et mises à jour des projets Banj Media.</p>
  </header>

  <!-- FILTERS -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">Tout</button>
    <button class="filter-btn" data-cat="Article">Articles</button>
    <button class="filter-btn" data-cat="Annonce">Annonces</button>
    <button class="filter-btn" data-cat="Presse">Presse</button>
    <button class="filter-btn" data-cat="Mise à jour projet">Mises à jour</button>
  </div>

  <!-- POSTS -->
  <section class="posts-section">
    <div class="posts-grid" id="posts-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Chargement…</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <a href="/" class="foot-logo-img">
      <img src="/assets/banj-media-logo.svg" alt="Banj Media" />
    </a>
    <small>&copy; 2026 Banj Media. Tous droits réservés.</small>
  </footer>

  <script>
    (function () {
      let allPosts = [];
      let activeFilter = 'all';

      function badgeClass(cat) {
        const map = {
          'Article':              'article',
          'Annonce':              'annonce',
          'Presse':               'presse',
          'Mise à jour projet':   'update',
        };
        return map[cat] || 'default';
      }

      function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      }

      function escapeHTML(str) {
        return String(str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function renderPosts(posts) {
        const grid = document.getElementById('posts-grid');
        if (!posts.length) {
          grid.innerHTML = '<div class="empty-state"><p>Aucun article pour le moment.</p></div>';
          return;
        }
        grid.innerHTML = posts.map(post => {
          const badge  = badgeClass(post.category);
          const imgHTML = post.featured_image
            ? `<img class="card-img" src="${post.featured_image}" alt="${escapeHTML(post.title)}" loading="lazy" />`
            : '';
          return `
            <a class="post-card" href="/blog/post.html?slug=${encodeURIComponent(post.slug)}">
              ${imgHTML}
              <div class="card-meta">
                <span class="cat-badge ${badge}">${escapeHTML(post.category || 'Article')}</span>
                <span class="card-date">${formatDate(post.date)}</span>
              </div>
              <h2 class="card-title">${escapeHTML(post.title)}</h2>
              <p class="card-excerpt">${escapeHTML(post.excerpt)}</p>
              <span class="card-cta">Lire →</span>
            </a>`;
        }).join('');
      }

      function applyFilter(cat) {
        activeFilter = cat;
        const filtered = cat === 'all'
          ? allPosts
          : allPosts.filter(p => p.category === cat);
        renderPosts(filtered);
      }

      document.getElementById('filters').addEventListener('click', function (e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.cat);
      });

      fetch('/blog/posts-manifest.json')
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(posts => { allPosts = posts; applyFilter(activeFilter); })
        .catch(() => {
          document.getElementById('posts-grid').innerHTML =
            '<div class="empty-state"><p>Aucun article disponible pour le moment.</p></div>';
        });
    })();
  </script>
</body>
</html>
