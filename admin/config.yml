backend:
  name: git-gateway
  branch: main

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

media_folder: "assets/blog"
public_folder: "/assets/blog"

collections:
  - name: "posts"
    label: "Articles"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    format: frontmatter
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Article", value: "Article" }
          - { label: "Annonce", value: "Annonce" }
          - { label: "Presse", value: "Presse" }
          - { label: "Mise à jour projet", value: "Mise à jour projet" }
      - { label: "Extrait", name: "excerpt", widget: "text" }
      - { label: "Image à la une", name: "featured_image", widget: "image", required: false }
      - { label: "Corps", name: "body", widget: "markdown", required: false }
      - label: "Liens réseaux sociaux"
        name: "social_links"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "X (Twitter)", name: "x", widget: "string", required: false }
          - { label: "TikTok", name: "tiktok", widget: "string", required: false }
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "YouTube", name: "youtube", widget: "string", required: false }
