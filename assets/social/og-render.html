<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;width:1200px;height:630px;overflow:hidden;
      background:
        radial-gradient(620px 460px at 82% 18%, rgba(217,43,43,.28), transparent 66%),
        linear-gradient(135deg,#151515 0%,#060606 100%);
      color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;
      position:relative;
    }
    body::before{
      content:"";position:absolute;inset:120px 0 auto 0;height:1px;background:rgba(255,255,255,.12);
      box-shadow:0 390px 0 rgba(255,255,255,.12);
    }
    body::after{
      content:"BANJ\A MEDIA";white-space:pre;position:absolute;right:54px;bottom:-34px;
      font-family:Impact,"Arial Black",sans-serif;font-size:138px;line-height:.78;
      color:rgba(255,255,255,.05);letter-spacing:2px;
    }
    .logo{position:absolute;left:76px;top:64px;width:116px;height:116px;border-radius:28px}
    .kicker{position:absolute;left:76px;top:224px;color:#D92B2B;font-size:18px;font-weight:800;letter-spacing:6px}
    .title{position:absolute;left:76px;top:268px;font-family:Impact,"Arial Black",sans-serif;font-size:94px;line-height:.92;letter-spacing:1px}
    .sub{position:absolute;left:80px;top:468px;color:#c7c7c7;font-size:27px;line-height:1.35;max-width:920px}
    .url{position:absolute;left:80px;bottom:44px;color:#D92B2B;font-size:18px;font-weight:800;letter-spacing:6px}
  </style>
</head>
<body>
  <img class="logo" src="../favicon/web-app-manifest-512x512.png" alt="">
  <div class="kicker">BANJ MEDIA</div>
  <div class="title">CREATIVE<br>INFRASTRUCTURE</div>
  <div class="sub">Media platform. Strategic agency. Production studio. Execution engine.</div>
  <div class="url">WWW.BANJMEDIA.COM</div>
</body>
</html>
