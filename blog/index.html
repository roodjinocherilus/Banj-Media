<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Banj Media</title>
  <meta name="description" content="Actualités, annonces et articles de Banj Media." />
  <link rel="canonical" href="https://www.banjmedia.com/blog/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════
       TOKENS
    ══════════════════════════════ */
    :root {
      --night:      #070923;
      --night-up:   #0d1030;
      --night-card: #111433;
      --red:        #e63c2f;
      --red-dim:    rgba(230,60,47,.12);
      --white:      #ffffff;
      --text:       #f0f0f0;
      --text-mid:   rgba(240,240,240,.6);
      --text-dim:   rgba(240,240,240,.35);
      --divider:    rgba(255,255,255,.08);
      --nav-h:      68px;

      /* category badge colours */
      --cat-article:  #3b82f6;
      --cat-annonce:  #e63c2f;
      --cat-presse:   #8b5cf6;
      --cat-update:   #22c55e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--night);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 300;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       NAVBAR
    ══════════════════════════════ */
    #topbar {
      position: sticky;
      top: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(7,9,35,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--divider);
      z-index: 900;
    }

    .tb-wordmark {
      font-family: 'Big Shoulders Display', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: .1em;
      color: var(--white);
      text-decoration: none;
    }
    .tb-wordmark em { color: var(--red); font-style: normal; }

    .tb-nav {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .tb-nav a {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-mid);
      text-decoration: none;
      transition: color .2s;
    }
    .tb-nav a:hover { color: var(--white); }
    .tb-nav .active { color: var(--white); }

    @media (max-width: 640px) {
      #topbar { padding: 0 20px; }
      .tb-nav { gap: 20px; }
    }

    /* ══════════════════════════════
       HERO
    ══════════════════════════════ */
    .hero {
      padding: 96px 48px 72px;
      border-bottom: 1px solid var(--divider);
    }
    .hero-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'Big Shoulders Display', sans-serif;
      font-weight: 900;
      font-size: clamp(48px, 8vw, 96px);
      line-height: .95;
      letter-spacing: -.01em;
      color: var(--white);
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 18px;
      font-weight: 300;
      color: var(--text-mid);
      max-width: 520px;
    }

    @media (max-width: 640px) {
      .hero { padding: 64px 20px 48px; }
    }

    /* ══════════════════════════════
       FILTER TABS
    ══════════════════════════════ */
    .filters {
      padding: 32px 48px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--divider);
    }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 100px;
      border: 1px solid var(--divider);
      background: transparent;
      color: var(--text-mid);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      margin-bottom: 0;
    }
    .filter-btn:hover {
      background: rgba(255,255,255,.06);
      color: var(--white);
    }
    .filter-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: var(--white);
    }
    .filters-bar {
      height: 1px;
      background: var(--divider);
      margin: 0 48px;
    }

    @media (max-width: 640px) {
      .filters { padding: 24px 20px 0; }
      .filters-bar { margin: 0 20px; }
    }

    /* ══════════════════════════════
       POSTS GRID
    ══════════════════════════════ */
    .posts-section {
      padding: 48px 48px 96px;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    @media (max-width: 1024px) {
      .posts-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .posts-section { padding: 32px 20px 64px; }
      .posts-grid { grid-template-columns: 1fr; gap: 20px; }
    }

    /* CARD */
    .post-card {
      background: var(--night-card);
      border: 1px solid var(--divider);
      border-radius: 12px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, transform .2s;
      text-decoration: none;
      color: inherit;
    }
    .post-card:hover {
      border-color: rgba(255,255,255,.18);
      transform: translateY(-3px);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cat-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .cat-badge.article   { background: rgba(59,130,246,.15);  color: #93c5fd; }
    .cat-badge.annonce   { background: var(--red-dim);         color: #fca5a5; }
    .cat-badge.presse    { background: rgba(139,92,246,.15);   color: #c4b5fd; }
    .cat-badge.update    { background: rgba(34,197,94,.12);    color: #86efac; }
    .cat-badge.default   { background: rgba(255,255,255,.08);  color: var(--text-mid); }

    .card-date {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .card-title {
      font-family: 'Big Shoulders Display', sans-serif;
      font-weight: 800;
      font-size: 22px;
      line-height: 1.15;
      color: var(--white);
      letter-spacing: .01em;
    }

    .card-excerpt {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.6;
      flex: 1;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--red);
      margin-top: 4px;
      transition: gap .15s;
    }
    .post-card:hover .card-cta { gap: 10px; }

    /* FEATURED IMAGE */
    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 4px;
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state p {
      color: var(--text-dim);
      font-size: 16px;
    }

    /* LOADING */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--divider);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    footer {
      border-top: 1px solid var(--divider);
      padding: 40px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .foot-wordmark {
      font-family: 'Big Shoulders Display', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: .1em;
      color: var(--white);
      text-decoration: none;
    }
    .foot-wordmark em { color: var(--red); font-style: normal; }
    footer small {
      font-size: 13px;
      color: var(--text-dim);
    }

    @media (max-width: 640px) {
      footer { padding: 32px 20px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav id="topbar">
    <a href="/" class="tb-wordmark">BANJ<em>.</em></a>
    <ul class="tb-nav">
      <li><a href="/">← Retour</a></li>
      <li><a href="/blog/" class="active">Blog</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <span class="hero-label">Actualités</span>
    <h1>News &amp; Blog</h1>
    <p>Annonces, analyses et mises à jour des projets Banj Media.</p>
  </header>

  <!-- FILTERS -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">Tout</button>
    <button class="filter-btn" data-cat="Article">Articles</button>
    <button class="filter-btn" data-cat="Annonce">Annonces</button>
    <button class="filter-btn" data-cat="Presse">Presse</button>
    <button class="filter-btn" data-cat="Mise à jour projet">Mises à jour</button>
  </div>

  <!-- POSTS -->
  <section class="posts-section">
    <div class="posts-grid" id="posts-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Chargement…</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <a href="/" class="foot-wordmark">BANJ<em>.</em> MEDIA</a>
    <small>&copy; 2026 Banj Media. Tous droits réservés.</small>
  </footer>

  <script>
    (function () {
      let allPosts = [];
      let activeFilter = 'all';

      // ── category → badge class
      function badgeClass(cat) {
        const map = {
          'Article':          'article',
          'Annonce':          'annonce',
          'Presse':           'presse',
          'Mise à jour projet': 'update',
        };
        return map[cat] || 'default';
      }

      // ── format date
      function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      }

      // ── render posts
      function renderPosts(posts) {
        const grid = document.getElementById('posts-grid');
        if (!posts.length) {
          grid.innerHTML = '<div class="empty-state"><p>Aucun article pour le moment.</p></div>';
          return;
        }
        grid.innerHTML = posts.map(post => {
          const badge = badgeClass(post.category);
          const imgHTML = post.featured_image
            ? `<img class="card-img" src="${post.featured_image}" alt="${escapeHTML(post.title)}" loading="lazy" />`
            : '';
          return `
            <a class="post-card" href="/blog/post.html?slug=${encodeURIComponent(post.slug)}">
              ${imgHTML}
              <div class="card-meta">
                <span class="cat-badge ${badge}">${escapeHTML(post.category || 'Article')}</span>
                <span class="card-date">${formatDate(post.date)}</span>
              </div>
              <h2 class="card-title">${escapeHTML(post.title)}</h2>
              <p class="card-excerpt">${escapeHTML(post.excerpt)}</p>
              <span class="card-cta">Lire →</span>
            </a>`;
        }).join('');
      }

      function escapeHTML(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ── filter
      function applyFilter(cat) {
        activeFilter = cat;
        const filtered = cat === 'all'
          ? allPosts
          : allPosts.filter(p => p.category === cat);
        renderPosts(filtered);
      }

      // ── filter buttons
      document.getElementById('filters').addEventListener('click', function (e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.cat);
      });

      // ── fetch manifest
      fetch('/blog/posts-manifest.json')
        .then(r => {
          if (!r.ok) throw new Error('manifest not found');
          return r.json();
        })
        .then(posts => {
          allPosts = posts;
          applyFilter(activeFilter);
        })
        .catch(() => {
          document.getElementById('posts-grid').innerHTML =
            '<div class="empty-state"><p>Aucun article disponible pour le moment.</p></div>';
        });
    })();
  </script>
</body>
</html>
